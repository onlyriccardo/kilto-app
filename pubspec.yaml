name: kilto
description: "Kilto — CRM mobile app. Client booking, staff management, vertical modules."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.4

  # SVG rendering (odontogram, body maps)
  flutter_svg: ^2.0.17

  # Image caching
  cached_network_image: ^3.4.1

  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0

  # i18n / dates
  intl: ^0.19.0

  # Google sign-in
  google_sign_in: ^6.2.2

  # Url launcher (for links)
  url_launcher: ^6.3.1

  # Image picker (avatar upload)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/svg/
